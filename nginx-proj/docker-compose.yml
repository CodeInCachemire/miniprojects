version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx-multidomain
    ports:
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/usr/share/nginx/html:ro
    networks:
      - nginx-network

networks:
  nginx-network:
    driver: bridge
